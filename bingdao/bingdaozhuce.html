<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>注册</title>
    <link rel="stylesheet" href="./base.css">
    <link rel="stylesheet" href="./bingdaodenglu.css">
</head>
<body>
    <div class="card">
    <h2>新用户注册</h2>
    <div class="option">
        <label><span>*</span>电话号码</label>
        <input type="text" placeholder="请输入您的号码">
    </div>
    <div class="option">
        <label><span>*</span>用户名</label>
        <input type="text" placeholder="请取用户名">
    </div>
    <div class="option">
        <label><span>*</span>密码：<input type="password" placeholder="请设置密码"></label>
        <br>
        <label><span>*</span>确认密码：<input type="password" placeholder="请输入确认密码"></label>
        <br>
    </div>
    <button>确认注册</button>
    </div>

</body>
</html>
